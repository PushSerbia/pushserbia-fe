<a
  [routerLink]="['/projekti', project().slug]"
  queryParamsHandling="merge"
  class="flex flex-col w-sm max-w-[calc(100svw-32px)] bg-neutral-950 border border-white/5 rounded-xl hover:border-white/10 transition-colors relative"
>
  @if (supported()) {
    <div class="absolute top-4 right-4 z-10">
      <svg
        class="w-7 h-7 text-red-500"
        fill="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path d="M12.01 6.001C6.5 1 1 8 5.782 13.001L12.011 20l6.23-7C23 8 17.5 1 12.01 6.002Z" />
      </svg>
    </div>
  }

  <div class="h-52 overflow-hidden rounded-t-xl">
    @if (project().image) {
      <img
        class="h-full w-full object-cover object-center"
        width="381"
        height="208"
        decoding="async"
        [priority]="priorityImg"
        [ngSrc]="project().image | unsplashUrlFormatter: {width: 600, height: 400}"
        [alt]="project().name"
        [style.viewTransitionName]="viewTransitionName()"
      />
    } @else {
      <div class="h-full w-full flex justify-center items-center bg-neutral-900 pt-3">
        <img
          class="w-full max-w-full h-40 object-contain"
          width="381"
          height="208"
          decoding="async"
          ngSrc="/illustrations/woman-earth-hugging.svg"
          [priority]="priorityImg"
          [alt]="project().name"
          [style.viewTransitionName]="viewTransitionName()"
        />
      </div>
    }
  </div>

  <div class="p-5">
    <h2 class="mb-2 text-xl font-bold tracking-tight text-white line-clamp-1">
      {{ project().name }}
    </h2>
    <p class="mb-4 text-sm text-neutral-400 line-clamp-4 h-20">
      {{ project().shortDescription }}
    </p>
    <span class="text-sm font-medium text-primary-400 hover:text-primary-300">
      Čitaj detalje →
    </span>
  </div>
</a>
