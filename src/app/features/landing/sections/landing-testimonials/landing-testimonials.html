<section class="bg-black py-20 lg:py-28 border-t border-white/5" aria-labelledby="testimonials-heading">
  <div class="container px-4 mx-auto lg:px-8 max-w-screen-xl">
    <h2
      id="testimonials-heading"
      class="font-mono text-3xl sm:text-4xl font-extrabold text-white tracking-tight text-center mb-16"
    >
      Šta kažu članovi
    </h2>

    <div class="grid gap-4 sm:gap-6 lg:grid-cols-3 max-w-5xl mx-auto">
      @for (testimonial of testimonials; track testimonial.name) {
        <div class="p-6 rounded-2xl border border-white/5 bg-neutral-950 hover:border-white/10 transition-colors">
          <p class="text-neutral-300 leading-relaxed mb-6">
            "{{ testimonial.quote }}"
          </p>
          <div class="flex items-center gap-3 pt-4 border-t border-white/5">
            <div
              class="w-8 h-8 rounded-full bg-primary-500 flex items-center justify-center text-white text-xs font-bold"
              aria-hidden="true"
            >
              {{ testimonial.initial }}
            </div>
            <div>
              <div class="text-sm font-medium text-white">{{ testimonial.name }}</div>
              <div class="text-xs text-neutral-600">{{ testimonial.role }}</div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
