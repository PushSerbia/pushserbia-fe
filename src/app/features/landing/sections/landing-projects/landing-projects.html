<section class="bg-black py-20 lg:py-28 border-t border-white/5" aria-labelledby="projects-heading">
  <div class="container px-4 mx-auto lg:px-8 max-w-screen-xl">
    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-14">
      <h2
        id="projects-heading"
        class="font-mono text-3xl sm:text-4xl font-extrabold text-white tracking-tight"
      >
        Projekti
      </h2>
      <a routerLink="/projekti" class="text-sm text-neutral-400 hover:text-white transition-colors">
        Svi projekti →
      </a>
    </div>

    <div class="flex flex-wrap gap-8">
      @for (project of $allProjects() | slice: 0 : 2; track project.id) {
        <app-project-card
          [project]="project"
          [supported]="$votesMap()[project.id]"
          [viewTransitionName]="viewTransitionName(project)"
        />
      }
      <app-project-card-new />
    </div>
  </div>
</section>
