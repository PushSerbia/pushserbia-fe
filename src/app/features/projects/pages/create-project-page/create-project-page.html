<app-basic-layout>
  <section
    class="bg-black flex justify-center flex-wrap flex-col-reverse xl:flex-nowrap xl:flex-row gap-8 relative pb-8 px-4 container mx-auto"
  >
    <aside
      class="h-fit md:sticky md:top-4 w-80 mx-auto xl:mx-0 shrink-0 overflow-y-auto border border-white/5 bg-neutral-950 p-3 shadow-sm lg:block lg:rounded-lg"
    >
      <ul class="space-y-2">
        <li>
          <a
            class="group flex items-center rounded-lg p-2 text-base font-medium text-neutral-400 hover:bg-white/5 hover:text-white"
            [routerLink]="'/projekti' + (slug() ? '/' + slug() : '')"
            queryParamsHandling="merge"
          >
            <svg
              class="h-6 w-6 text-neutral-600 transition duration-75 group-hover:text-white"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m14 8-4 4 4 4"
              />
            </svg>
            <span class="ml-3 flex-1 whitespace-nowrap">Svi projekti</span>
          </a>
        </li>
      </ul>
    </aside>

    <div
      class="flex flex-col gap-8 py-8 px-6 mx-auto xl:mx-0 max-w-screen-xl overflow-hidden bg-neutral-950 border border-white/5 rounded-2xl shadow-lg w-full"
    >
      @if (form()) {
        <h2
          class="text-2xl font-bold text-white border-b-2 border-white/5 pb-8"
        >
          {{ project ? 'Ažuriraj' : 'Predloži novi' }} projekat
        </h2>
        <form (submit)="onSubmit($event)">
          <div class="grid gap-4 sm:grid-cols-2 sm:gap-2">
            <!-- #region Image Selector -->
            <div class="sm:col-span-2">
              <app-image-control class="flex justify-center items-center" [field]="form.image" />

              <app-validation-message [control]="form.image" />
            </div>
            <!-- #endregion Image Selector -->

            <!--#region Name -->
            <div class="sm:col-span-2">
              <label
                for="name"
                class="block mb-2 text-sm font-medium text-neutral-400"
              >
                Ime projekta
              </label>
              <input
                type="text"
                id="name"
                [field]="form.name"
                class="bg-neutral-900 border border-white/10 text-white text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 placeholder-neutral-600"
                placeholder="Kreativno ime projekta"
              />
              <app-validation-message [control]="form.name" />
            </div>
            <!--#endregion Name -->

            <!--#region Slug -->
            <div class="sm:col-span-2">
              <label
                for="slug"
                class="block mb-2 text-sm font-medium text-neutral-400"
              >
                Slug
              </label>
              <input
                type="text"
                id="slug"
                [field]="form.slug"
                class="bg-neutral-900 border border-white/10 text-white text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 placeholder-neutral-600"
                placeholder="kreativno-ime-projekta"
              />
              <app-validation-message [control]="form.slug" />
            </div>
            <!--#endregion Slug -->

            <!--#region GitHub Link -->
            <div class="sm:col-span-2">
              <label
                for="github"
                class="block mb-2 text-sm font-medium text-neutral-400"
              >
                GitHub link
              </label>
              <input
                type="text"
                id="github"
                [field]="form.github"
                class="bg-neutral-900 border border-white/10 text-white text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 placeholder-neutral-600"
                placeholder="https://github.com/username/repository"
              />
              <app-validation-message [control]="form.github" />
            </div>
            <!--#endregion GitHub Link -->

            <!--#region Status -->
            @if (project) {
              <div class="sm:col-span-2">
                <label
                  for="status"
                  class="block mb-2 text-sm font-medium text-neutral-400"
                >
                  Status projekta
                </label>
                <select
                  id="status"
                  [field]="form.status!"
                  class="bg-neutral-900 border border-white/10 text-white text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 placeholder-neutral-600"
                >
                  <option [value]="projectStatus.Pending">{{ projectStatus.Pending }}</option>
                  <option [value]="projectStatus.Voting">{{ projectStatus.Voting }}</option>
                  <option [value]="projectStatus.InProgress">{{ projectStatus.InProgress }}</option>
                  <option [value]="projectStatus.Maintenance">
                    {{ projectStatus.Maintenance }}
                  </option>
                  <option [value]="projectStatus.Closed">{{ projectStatus.Closed }}</option>
                  <option [value]="projectStatus.Declined">{{ projectStatus.Declined }}</option>
                </select>
                <app-validation-message [control]="form.status!" />
              </div>
            }
            <!--#endregion Status -->

            <!--#region Short Description -->
            <div class="sm:col-span-2">
              <label
                for="shortDescription"
                class="block mb-2 text-sm font-medium text-neutral-400"
              >
                Kratak opis
              </label>
              <textarea
                id="shortDescription"
                [field]="form.shortDescription"
                rows="5"
                class="block p-2.5 w-full text-sm text-white bg-neutral-900 rounded-lg border border-white/10 focus:ring-primary-500 focus:border-primary-500 placeholder-neutral-600"
                placeholder="Biće vidljiv na karticama projekta"
              ></textarea>
              <app-validation-message [control]="form.shortDescription" />
            </div>
            <!--#endregion Short Description -->

            <!--#region Description -->
            <div class="sm:col-span-2">
              <label
                for="description"
                class="block mb-2 text-sm font-medium text-neutral-400"
              >
                Opis
              </label>
              <quill-editor
                id="description"
                class="quill-editor-custom w-full"
                placeholder="Unesi detaljan opis projekta koji će se prikazivati kada korisnik otvori detalje projekta"
                [ngModel]="model().description"
                name="description"
                (onEditorCreated)="onQuillCreated($event)"
                (onContentChanged)="onQuillContentChanged($event)"
              />
              <app-validation-message [control]="form.description" />
            </div>
            <!--#endregion Description -->
          </div>

          <button
            type="submit"
            [disabled]="form().invalid() || form().submitting()"
            class="inline-flex items-center px-5 py-2.5 mt-4 sm:mt-6 text-sm font-medium text-center text-white bg-primary-700 rounded-lg focus:ring-4 focus:ring-primary-200 hover:bg-primary-800 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
          >
            Sačuvaj
          </button>
        </form>
      } @else if ($loading()) {
        <app-page-loader
          class="flex items-center justify-center text-center w-full h-96 align-middle"
        />
      }
    </div>
  </section>
</app-basic-layout>
