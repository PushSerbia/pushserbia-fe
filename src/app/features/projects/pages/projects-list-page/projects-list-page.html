<app-basic-layout>
  <div class="container mx-auto px-4 py-8 lg:pb-16 flex flex-col gap-8">
    <app-project-list-header />

    <div class="flex items-center gap-6 flex-wrap">
      <button
        class="flex items-center justify-center px-2 py-2 text-sm font-medium text-center text-neutral-400 bg-transparent border border-neutral-800 rounded-lg hover:text-white hover:border-neutral-600 focus:ring-4 focus:outline-none focus:ring-neutral-800 cursor-pointer"
        routerLink="/projekti/novi"
        appAuthRequired
      >
        <svg
          class="w-4 h-4"
          fill="currentColor"
          viewBox="0 0 20 20"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            clip-rule="evenodd"
            d="M10 3a1 1 0 011 1v6h6a1 1 0 110 2h-6v6a1 1 0 11-2 0v-6H4a1 1 0 110-2h6V4a1 1 0 011-1z"
            fill-rule="evenodd"
          ></path>
        </svg>

        <span class="ml-2">Predloži projekat</span>
      </button>

      @if ($currentUser()) {
        <app-project-list-filters [state]="$filter()" (updated)="onFilterUpdate($event)" />
      }
    </div>

    <section class="flex gap-6 flex-wrap">
      @if ($loading()) {
        <app-page-loader
          class="flex items-center justify-center text-center w-full h-96 align-middle"
        />
      } @else {
        @let votesMap = $votesMap();
        @for (project of $projects(); track project.id; let i = $index) {
          <app-project-card
            [project]="project"
            [supported]="!!votesMap[project.id]"
            [viewTransitionName]="viewTransitionName(project)"
            [priorityImg]="i < 3"
          />
        } @empty {
          <div class="w-full flex items-center justify-center text-center">
            <p class="text-neutral-400">Nema projekata koji odgovaraju tvojim filtrima.</p>
          </div>
        }
      }
    </section>
  </div>
</app-basic-layout>
