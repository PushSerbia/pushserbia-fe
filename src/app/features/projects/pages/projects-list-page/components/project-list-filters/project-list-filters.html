<section class="flex items-center gap-6 flex-wrap">
  <div>
    <label class="relative inline-flex items-center cursor-pointer">
      <input
        type="checkbox"
        [value]="true"
        (change)="
          updated.emit({
            myProjectsOnly: inputMyProjects.checked,
            supportedOnly: state()?.supportedOnly || false,
          })
        "
        class="sr-only peer"
        [checked]="state()?.myProjectsOnly"
        #inputMyProjects
      />
      <div
        class="w-11 h-6 bg-neutral-800 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-primary-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-neutral-600 after:border after:rounded-full after:h-5 after:w-5 after:transition-all border-neutral-700 peer-checked:bg-primary-600"
      ></div>
      <span class="ml-3 text-sm font-medium text-neutral-400"> Moji projekti </span>
    </label>
  </div>

  <div>
    <label class="relative inline-flex items-center cursor-pointer">
      <input
        type="checkbox"
        [value]="true"
        (change)="
          updated.emit({
            myProjectsOnly: state()?.myProjectsOnly || false,
            supportedOnly: inputSupported.checked,
          })
        "
        class="sr-only peer"
        [checked]="state()?.supportedOnly"
        #inputSupported
      />
      <div
        class="w-11 h-6 bg-neutral-800 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-primary-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-neutral-600 after:border after:rounded-full after:h-5 after:w-5 after:transition-all border-neutral-700 peer-checked:bg-primary-600"
      ></div>
      <span class="ml-3 text-sm font-medium text-neutral-400">
        Podržani projekti
      </span>
    </label>
  </div>
</section>
